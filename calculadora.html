    <main class="principal">
        <section class="calculado">
            <h3>Simulador de Pontos</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Arroz (5kg) - 10 pontos</label>
                    <input type="number" id="atdeArroz" min="0">
                </div>
                <div class="form-group">
                    <label>Feijão (5kg) - 10 pontos</label>
                    <input type="number" id="atdeFeijao" min="0">
                </div>
            </div>
            <button onclick="calcular()">Calcular Total de Equipes</button>
            <div>

            </div>
        </section>

<script>
    function calcular(){
        let qtArroz = Number (document.getElementById("qtArroz").value)
        // recupera o valor informado npo elemento com id qtdeArroz
        let qtFeijao = Number (document.getElementById("qtFeijao").value)

        let pontos = (qtArroz *10) + (qtFeijao * 8)

        document.getElementById("Resultado").innerText = "Ponto total: " + pontos
    }
</script>
